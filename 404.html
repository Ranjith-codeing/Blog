<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found | Ranjith Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .not-found {
      max-width: 500px;
      margin: 80px auto;
      padding: 0 24px;
      text-align: center;
    }
    .not-found-code {
      font-family: var(--font-mono);
      font-size: 80px;
      font-weight: 500;
      color: var(--border);
      line-height: 1;
      margin-bottom: 20px;
    }
    .not-found h1 {
      font-family: var(--font-display);
      font-size: 28px;
      color: var(--ink);
      margin-bottom: 12px;
    }
    .not-found p {
      color: var(--ink-soft);
      margin-bottom: 28px;
    }
    .home-link {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 12px 24px;
      border-radius: 5px;
      font-weight: 700;
      font-size: 14px;
    }
    .home-link:hover { background: #a83828; text-decoration: none; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo"><a href="index.html">Ranjith</a></div>
    </div>
  </header>
  <div class="not-found">
    <div class="not-found-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist on this site.</p>
    <a href="index.html" class="home-link">Back to the blog</a>
  </div>
  <footer class="site-footer">
    <div class="footer-inner" style="justify-content:center;">
      <span>© 2026 Ranjith</span>
    </div>
  </footer>
</body>
</html>
